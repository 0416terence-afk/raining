<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>r41n1ng</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:#000}
body{
  font-family:'Inter',sans-serif;
  background:#000;color:#fff;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ── FIXED CANVAS ── */
#cv{position:fixed;inset:0;z-index:1;pointer-events:none}

/* ── HEADER ── */
#hdr{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:48px;display:flex;align-items:center;justify-content:center;
  transition:background .6s;
}
#hdr.bg{background:rgba(0,0,0,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.hdr-name{
  font-size:13px;font-weight:500;letter-spacing:1px;color:rgba(255,255,255,.85);
  opacity:0;transition:opacity .6s;
}
#hdr.bg .hdr-name{opacity:1}

/* ── PROGRESS ── */
#prog{
  position:fixed;top:0;left:0;height:1px;z-index:201;
  background:rgba(255,255,255,.5);width:0%;transition:width .08s linear;
}

/* ── NAV DOTS ── */
#nav{
  position:fixed;right:16px;top:50%;transform:translateY(-50%);
  z-index:200;display:flex;flex-direction:column;gap:10px;
}
.ndot{
  width:4px;height:4px;border-radius:50%;
  background:rgba(255,255,255,.2);cursor:pointer;
  transition:all .35s cubic-bezier(.16,1,.3,1);
}
.ndot.on{background:#fff;transform:scale(1.8)}

/* ── SCROLL CONTAINER ── */
#scr{
  height:100svh;overflow-y:auto;overflow-x:hidden;
  scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;
  position:relative;z-index:10;
  background:transparent;
}
#scr::-webkit-scrollbar{display:none}

/* ── SCENES ── */
.scene{
  min-height:100svh;
  scroll-snap-align:start;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  padding:80px 32px;
  position:relative;
  text-align:center;
}

/* ── TEXT BLOCKS ── */
.tag{
  font-size:11px;font-weight:400;letter-spacing:3px;
  color:rgba(255,255,255,.4);
  margin-bottom:16px;
  opacity:0;transform:translateY(10px);
  transition:opacity .9s ease, transform .9s ease;
}
.tag.in{opacity:1;transform:none}

.headline{
  font-size:clamp(36px,10vw,64px);
  font-weight:200;letter-spacing:-1.5px;line-height:1.05;
  color:#fff;
  opacity:0;transform:translateY(20px);
  transition:opacity 1s .1s ease, transform 1s .1s cubic-bezier(.16,1,.3,1);
}
.headline.in{opacity:1;transform:none}
.headline b{font-weight:500}

.subline{
  font-size:clamp(14px,3.5vw,18px);font-weight:300;
  color:rgba(255,255,255,.5);letter-spacing:-.2px;
  line-height:1.7;margin-top:16px;max-width:340px;
  opacity:0;transform:translateY(14px);
  transition:opacity 1s .25s ease, transform 1s .25s cubic-bezier(.16,1,.3,1);
}
.subline.in{opacity:1;transform:none}

/* ── CARDS ROW ── */
.cards{
  display:flex;gap:10px;overflow-x:auto;
  padding:0 2px 4px;width:100%;max-width:500px;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
  margin-top:28px;
  opacity:0;transform:translateY(16px);
  transition:opacity 1s .3s ease, transform 1s .3s cubic-bezier(.16,1,.3,1);
}
.cards.in{opacity:1;transform:none}
.cards::-webkit-scrollbar{display:none}

.card{
  flex-shrink:0;min-width:140px;
  background:transparent;
  border:none;
  border-left:1px solid rgba(255,255,255,.15);
  border-radius:0;
  padding:0 0 0 14px;
  text-align:left;text-decoration:none;color:inherit;
  transition:border-color .2s;
}
.card:active{border-color:rgba(255,255,255,.5)}
.card-label{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.3);margin-bottom:7px;font-weight:400}
.card-title{font-size:14px;font-weight:400;color:#fff;line-height:1.3;margin-bottom:5px}
.card-sub{font-size:11px;font-weight:300;color:rgba(255,255,255,.35);line-height:1.5}
.card-cta{
  display:inline-block;margin-top:12px;
  font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,.45);
}

/* ── LIST ── */
.list{
  width:100%;max-width:420px;margin-top:20px;
  opacity:0;transform:translateY(16px);
  transition:opacity 1s .3s ease, transform 1s .3s cubic-bezier(.16,1,.3,1);
  text-align:left;
}
.list.in{opacity:1;transform:none}

.li{
  display:flex;align-items:center;gap:14px;
  padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06);
  text-decoration:none;color:inherit;
  transition:opacity .15s;
  background:transparent;
}
.li:last-child{border-bottom:none}
.li:active{opacity:.6}
.li-num{font-size:10px;font-weight:300;color:rgba(255,255,255,.2);min-width:22px}
.li-body{flex:1}
.li-title{font-size:14px;font-weight:400;color:rgba(255,255,255,.85);line-height:1.3;margin-bottom:2px}
.li-sub{font-size:11px;font-weight:300;color:rgba(255,255,255,.3)}
.li-arr{font-size:13px;color:rgba(255,255,255,.2)}

/* ── LINK ROWS ── */
.lrow{
  display:flex;align-items:center;gap:16px;
  padding:18px 0;border-bottom:1px solid rgba(255,255,255,.07);
  text-decoration:none;color:inherit;transition:opacity .2s;
}
.lrow:last-child{border-bottom:none}
.lrow:active{opacity:.6}
.lrow-icon{
  width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
  background:transparent;
  border:none;
  opacity:.6;
}
.lrow-name{font-size:15px;font-weight:400;color:#fff;margin-bottom:2px}
.lrow-handle{font-size:12px;font-weight:300;color:rgba(255,255,255,.35)}
.lrow-arr{margin-left:auto;font-size:14px;color:rgba(255,255,255,.2)}

/* ── SCROLL HINT ── */
.hint{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.2);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  opacity:0;transition:opacity 1s .8s;
}
.hint.in{opacity:1}
.hint::after{
  content:'';width:1px;height:18px;
  background:linear-gradient(180deg,rgba(255,255,255,.3),transparent);
  animation:drip 1.8s ease-in-out infinite;
}
@keyframes drip{0%,100%{transform:scaleY(1);opacity:.4}50%{transform:scaleY(1.4);opacity:.9}}

/* ── SCENE BG — fully transparent so 3D dominates ── */
#s0,#s1,#s2,#s3,#s4,#s5{background:transparent}
</style>
</head>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ═══════════════════════════

const DATA = {
  ctf:[
    {t:"picoCTF 2026", y:"2026", d:"", u:"https://hackmd.io/@VMMN30ECT5CKLjFl7pA8pA/B1QlirWcZx"},
    {t:"picoCTF",      y:"2025", d:"", u:"https://hackmd.io/@VMMN30ECT5CKLjFl7pA8pA/SyxJXFWObx"},

    {t:"ASIS CTF",     y:"2025", d:"第一次參加，熟悉環境", u:"https://hackmd.io/@VMMN30ECT5CKLjFl7pA8pA/r1IBRQCX-x"},

    {t:"Reverse 入門筆記",   s:"逆向技巧 · 工具 · 動態分析",     u:"https://hackmd.io/@VMMN30ECT5CKLjFl7pA8pA/Hklq0_Fbbl"},

/* ── RENDER ── */
document.getElementById('ctf-cards').innerHTML = DATA.ctf.map(c=>`
  <a href="${c.u}" target="_blank" class="card">
    <div class="card-label">${c.y}</div>

/* ═══════════════════════════
   BACKGROUND CANVAS (CSS gradient per scene)
═══════════════════════════ */
const BG_COLORS = [
  ['#0a0010','#1a0535'],   // S0 — deep violet
  ['#001020','#002a4a'],   // S1 — midnight blue
  ['#100005','#280010'],   // S2 — dark crimson
  ['#000d10','#001e28'],   // S3 — deep teal
  ['#080010','#160030'],   // S4 — indigo
  ['#0a0a00','#1a1500'],   // S5 — dark amber
];
const bodyEl = document.body;
function setBg(i){
  const [a,b] = BG_COLORS[i]||BG_COLORS[0];
  bodyEl.style.background = `radial-gradient(ellipse at 50% 40%, ${b} 0%, ${a} 70%)`;
  bodyEl.style.transition = 'background 1.2s ease';
}
setBg(0);

/* ═══════════════════════════
   THREE.JS
═══════════════════════════ */
(function(){
  const cv = document.getElementById('cv');
  const renderer = new THREE.WebGLRenderer({canvas:cv, alpha:true, antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 300);
  camera.position.z = 20;

  const W = (c,op) => new THREE.MeshBasicMaterial({color:c, wireframe:true, transparent:true, opacity:op});
  const L = (c,op) => new THREE.LineBasicMaterial({color:c, transparent:true, opacity:op});

  /* ─────────────────────────────────────
     S0 — GIANT PULSING SPHERE SYSTEM
     Three nested icosahedra + 3 orbital rings
  ───────────────────────────────────── */
  const s0 = new THREE.Group();
  {
    // Three nested shells — large enough to fill screen
    const shells = [
      new THREE.Mesh(new THREE.IcosahedronGeometry(9, 3), W(0xffffff,.18)),
      new THREE.Mesh(new THREE.IcosahedronGeometry(6.5, 2), W(0xaaaaff,.14)),
      new THREE.Mesh(new THREE.IcosahedronGeometry(4, 2), W(0xffffff,.22)),
    ];
    shells.forEach(s => s0.add(s));
    s0._shells = shells;

    // 3 orbital torus rings at different angles
    const ringData = [[9.2,.04,0,0xffffff,.3],[7,.03,.6,0xccccff,.25],[5,.035,1.2,0xffffff,.2]];
    s0._rings = ringData.map(([r,t,rx,c,op])=>{
      const m = new THREE.Mesh(new THREE.TorusGeometry(r,t,4,100), new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:op}));
      m.rotation.x = rx; s0.add(m); return m;
    });

    // Fast-spinning inner cross lines
    for(let i=0;i<3;i++){
      const pts=[new THREE.Vector3(-4,0,0),new THREE.Vector3(4,0,0)];
      const geo=new THREE.BufferGeometry().setFromPoints(pts);
      const ln=new THREE.Line(geo,L(0xffffff,.15));
      ln.rotation.set(i/3*Math.PI,i/3*Math.PI*.7,0);
      s0.add(ln);
    }
  }
  scene.add(s0);

  /* ─────────────────────────────────────
     S1 — DNA HELIX fills screen height + extra rings
  ───────────────────────────────────── */
  const s1g = new THREE.Group(); s1g.visible=false;
  {
    const STRAND = 120;
    for(let k=0;k<2;k++){
      const pts=[];
      for(let i=0;i<STRAND;i++){
        const t=i/STRAND, a=t*Math.PI*8+k*Math.PI;
        pts.push(new THREE.Vector3(Math.cos(a)*3.5,(t-.5)*18,Math.sin(a)*3.5));
      }
      const tube=new THREE.Mesh(
        new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),200,.06,6,false),
        new THREE.MeshBasicMaterial({color:k?0x88aaff:0xffffff,transparent:true,opacity:.35})
      );
      s1g.add(tube);
    }
    for(let i=0;i<STRAND;i+=3){
      const t=i/STRAND, a=t*Math.PI*8;
      const p1=new THREE.Vector3(Math.cos(a)*3.5,(t-.5)*18,Math.sin(a)*3.5);
      const p2=new THREE.Vector3(Math.cos(a+Math.PI)*3.5,(t-.5)*18,Math.sin(a+Math.PI)*3.5);
      s1g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([p1,p2]),L(0xaaaaff,.15)));
    }
    // Orbiting spheres along helix
    for(let i=0;i<8;i++){
      const t=i/8, a=t*Math.PI*8;
      const sp=new THREE.Mesh(new THREE.IcosahedronGeometry(.3,0),W(0xffffff,.5));
      sp.position.set(Math.cos(a)*3.5,(t-.5)*18,Math.sin(a)*3.5);
      s1g.add(sp);
    }
  }
  scene.add(s1g);

  /* ─────────────────────────────────────
     S2 — EXPLODING FRAGMENTS + shockwave rings
  ───────────────────────────────────── */
  const s2g = new THREE.Group(); s2g.visible=false;
  {
    const NFRAG=40;
    s2g._frags=[];
    for(let i=0;i<NFRAG;i++){
      const sz=.4+Math.random()*1.2;
      const geo=[
        new THREE.TetrahedronGeometry(sz,0),
        new THREE.OctahedronGeometry(sz*.7,0),
        new THREE.IcosahedronGeometry(sz*.6,0),
      ][i%3];
      const m=new THREE.Mesh(geo,W(0xffffff,.25+Math.random()*.3));
      // initial explode position
      const th=Math.random()*Math.PI*2, ph=Math.random()*Math.PI;
      const r=5+Math.random()*7;
      m._ox=Math.sin(ph)*Math.cos(th)*r;
      m._oy=Math.sin(ph)*Math.sin(th)*r*(0.5+Math.random()*.5);
      m._oz=Math.cos(ph)*r;
      m.position.set(m._ox,m._oy,m._oz);
      m._rx=(.5-Math.random())*.02;m._ry=(.5-Math.random())*.015;
      s2g.add(m); s2g._frags.push(m);
    }
    // Expanding shockwave rings
    s2g._waves=[];
    for(let i=0;i<3;i++){
      const ring=new THREE.Mesh(new THREE.TorusGeometry(1,.03,4,60),new THREE.MeshBasicMaterial({color:0xff4444,transparent:true,opacity:.3}));
      ring._phase=i/3*Math.PI*2;
      s2g.add(ring); s2g._waves.push(ring);
    }
  }
  scene.add(s2g);

  /* ─────────────────────────────────────
     S3 — TORUS KNOT + cascading rings + orbits
  ───────────────────────────────────── */
  const s3g = new THREE.Group(); s3g.visible=false;
  {
    s3g._knot=new THREE.Mesh(
      new THREE.TorusKnotGeometry(5,.18,300,16,2,3),
      W(0x44ffcc,.3)
    );
    s3g.add(s3g._knot);

    s3g._rings=[];
    [[7,.04,0xffffff,.15,0,0],[5.5,.03,0x44ffcc,.12,.5,1],[9,.025,0xaaffee,.1,1,-.5]].forEach(([r,t,c,op,rx,ry])=>{
      const ring=new THREE.Mesh(new THREE.TorusGeometry(r,t,4,80),new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:op}));
      ring.rotation.set(rx,ry,0); s3g.add(ring); s3g._rings.push(ring);
    });

    // 6 orbiting dots
    s3g._orbs=[];
    for(let i=0;i<6;i++){
      const o=new THREE.Mesh(new THREE.IcosahedronGeometry(.25,0),W(0x44ffcc,.6));
      o._a=i/6*Math.PI*2; o._r=6.5; o._sp=.018;
      s3g.add(o); s3g._orbs.push(o);
    }
  }
  scene.add(s3g);

  /* ─────────────────────────────────────
     S4 — 3D NETWORK GRAPH (nodes floating in space)
  ───────────────────────────────────── */
  const s4g = new THREE.Group(); s4g.visible=false;
  {
    const nodes3d=[
      [0,0,0],[3,2,-2],[-3,2,1],[2,-3,-1],[-2,-2,2],
      [4,-1,2],[-4,1,-2],[1,4,-1],[-1,-4,1],[3,-3,3],[-3,3,-3]
    ];
    s4g._nodes=nodes3d.map(([x,y,z])=>{
      const m=new THREE.Mesh(new THREE.IcosahedronGeometry(.3,1),W(0xffffff,.7));
      m.position.set(x*1.2,y*1.2,z);
      m._base={x:x*1.2,y:y*1.2,z};
      m._phase=Math.random()*Math.PI*2;
      s4g.add(m); return m;
    });
    nodes3d.forEach(([x1,y1,z1],i)=>{
      nodes3d.forEach(([x2,y2,z2],j)=>{
        if(j<=i) return;
        const d=Math.hypot(x2-x1,y2-y1,z2-z1);
        if(d<5){
          const geo=new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(x1*1.2,y1*1.2,z1),
            new THREE.Vector3(x2*1.2,y2*1.2,z2)
          ]);
          s4g.add(new THREE.Line(geo,L(0x6688ff,.12)));
        }
      });
    });
  }
  scene.add(s4g);

  /* ─────────────────────────────────────
     S5 — SATURN-LIKE RING SYSTEM + spiral
  ───────────────────────────────────── */
  const s5g = new THREE.Group(); s5g.visible=false;
  {
    // Central sphere
    s5g._core=new THREE.Mesh(new THREE.IcosahedronGeometry(2.5,3),W(0xffdd88,.25));
    s5g.add(s5g._core);

    // Multiple tilted rings like Saturn
    s5g._satRings=[];
    [[4,.08,0xffdd88,.3,0],[5.5,.05,0xffaa44,.2,.3],[7,.04,0xffffff,.15,.6],[8.5,.03,0xffdd88,.1,.9]].forEach(([r,t,c,op,rx])=>{
      const ring=new THREE.Mesh(new THREE.TorusGeometry(r,t,4,100),new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:op}));
      ring.rotation.x=rx+.4; ring._sp=.004+Math.random()*.003;
      s5g.add(ring); s5g._satRings.push(ring);
    });

    // Spiral particle trail
    const spiralPts=[];
    for(let i=0;i<200;i++){
      const t=i/200, a=t*Math.PI*8;
      spiralPts.push(new THREE.Vector3(Math.cos(a)*(2+t*3),(t-.5)*6,Math.sin(a)*(2+t*3)));
    }
    const spiralGeo=new THREE.BufferGeometry().setFromPoints(spiralPts);
    s5g.add(new THREE.Line(spiralGeo,L(0xffdd88,.2)));
  }
  scene.add(s5g);

  const groups = [s0, s1g, s2g, s3g, s4g, s5g];

  /* ── ALWAYS-ON ambient particles ── */
  const NP=800;
  const pp=new Float32Array(NP*3);
  const pv=[];
  for(let i=0;i<NP;i++){
    pp[i*3]=(Math.random()-.5)*90;pp[i*3+1]=(Math.random()-.5)*70;pp[i*3+2]=(Math.random()-.5)*40-5;
    pv.push({x:(.5-Math.random())*.006,y:(.5-Math.random())*.006});
  }
  const pGeo=new THREE.BufferGeometry();pGeo.setAttribute('position',new THREE.BufferAttribute(pp,3));
  const pMesh=new THREE.Points(pGeo,new THREE.PointsMaterial({color:0xffffff,size:.08,transparent:true,opacity:.2}));
  scene.add(pMesh);

  /* ── OPACITY FADE SYSTEM ── */
  let curScene=0;
  // Store base opacities of each mesh before fade manipulation
  groups.forEach(g=>{
    g.traverse(c=>{
      if((c.isMesh||c.isLine)&&c.material) c.material._base=c.material.opacity;
    });
  });
  const alpha=groups.map((_,i)=>({v:i===0?1:0, t:i===0?1:0}));

  function setScene(i){
    if(i===curScene) return;
    alpha[curScene].t=0;
    curScene=i;
    groups[i].visible=true;
    alpha[i].t=1;
    setBg(i);
  }
  window._setScene=setScene;

  /* ── GYRO / TOUCH ── */
  let mx=0,my=0;
  window.addEventListener('deviceorientation',e=>{mx=(e.gamma||0)/60;my=(e.beta||0)/80});
  document.addEventListener('touchmove',e=>{
    mx=(e.touches[0].clientX/innerWidth-.5)*2;
    my=(e.touches[0].clientY/innerHeight-.5)*2;
  },{passive:true});

  let tick=0;
  (function loop(){
    requestAnimationFrame(loop);tick+=.005;

    /* Fade groups */
    groups.forEach((g,i)=>{
      alpha[i].v+=(alpha[i].t-alpha[i].v)*.06;
      const a=alpha[i].v;
      if(a<.005&&alpha[i].t===0){g.visible=false;return;}
      g.traverse(c=>{
        if((c.isMesh||c.isLine)&&c.material&&c.material._base!=null)
          c.material.opacity=c.material._base*a;
      });
    });

    /* Ambient particles drift */
    for(let i=0;i<NP;i++){
      pp[i*3]+=pv[i].x; pp[i*3+1]+=pv[i].y;
      if(Math.abs(pp[i*3])>45){pv[i].x*=-1;} if(Math.abs(pp[i*3+1])>35){pv[i].y*=-1;}
    }
    pGeo.attributes.position.needsUpdate=true;

    /* S0 — breathing nested shells */
    if(s0.visible){
      const breath=1+Math.sin(tick*1.5)*.08;
      s0._shells[0].rotation.y=tick*.04; s0._shells[0].rotation.x=tick*.02;
      s0._shells[1].rotation.y=-tick*.07; s0._shells[1].rotation.z=tick*.03;
      s0._shells[2].rotation.y=tick*.12; s0._shells[2].rotation.x=-tick*.05;
      s0._shells[0].scale.setScalar(breath);
      s0._rings[0].rotation.z=tick*.08;
      s0._rings[1].rotation.z=-tick*.06; s0._rings[1].rotation.y=tick*.04;
      s0._rings[2].rotation.y=tick*.1; s0._rings[2].rotation.z=tick*.05;
    }

    /* S1 — helix rotates + bobs */
    if(s1g.visible){
      s1g.rotation.y=tick*.18;
      s1g.position.y=Math.sin(tick*.4)*.5;
    }

    /* S2 — fragments orbit + shockwaves expand */
    if(s2g.visible){
      const pulse=1+Math.sin(tick*1.2)*.12;
      s2g._frags.forEach(f=>{
        f.position.set(f._ox*pulse,f._oy*pulse,f._oz*pulse);
        f.rotation.x+=f._rx; f.rotation.y+=f._ry;
      });
      s2g.rotation.y=tick*.04;
      s2g._waves.forEach((w,i)=>{
        const t=((tick*.5+w._phase)%(Math.PI*2))/(Math.PI*2);
        const r=1+t*12; w.scale.setScalar(r);
        const mat=w.material;
        if(mat._base) mat.opacity=mat._base*(1-t)*.8;
      });
    }

    /* S3 — torus knot spins + rings counter-rotate + orbs orbit */
    if(s3g.visible){
      s3g._knot.rotation.y=tick*.25;
      s3g._knot.rotation.z=tick*.14;
      s3g._rings.forEach((r,i)=>{r.rotation.z+=.003+i*.002; r.rotation.y+=.002;});
      s3g._orbs.forEach(o=>{
        o._a+=o._sp;
        o.position.set(Math.cos(o._a)*o._r,Math.sin(o._a*.7)*2.5,Math.sin(o._a)*o._r*.5);
      });
    }

    /* S4 — nodes float + rotate */
    if(s4g.visible){
      s4g.rotation.y=Math.sin(tick*.12)*.15;
      s4g._nodes.forEach(n=>{
        n.position.y=n._base.y+Math.sin(tick*40*.015+n._phase)*.4;
        n.rotation.y+=.01;
      });
    }

    /* S5 — saturn rings spin at different rates + core pulses */
    if(s5g.visible){
      const cp=1+Math.sin(tick*1.8)*.07;
      s5g._core.scale.setScalar(cp);
      s5g._core.rotation.y=tick*.08; s5g._core.rotation.x=tick*.04;
      s5g._satRings.forEach((r,i)=>{r.rotation.z+=r._sp*(i%2?1:-1);});
    }

    /* Camera parallax */
    camera.position.x+=(mx*5-camera.position.x)*.04;
    camera.position.y+=(-my*3-camera.position.y)*.04;
    camera.lookAt(0,0,0);
    renderer.render(scene,camera);
  })();

  window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);
  });
})();

/* ═══════════════════════════
   SCROLL LOGIC
═══════════════════════════ */
const scr    = document.getElementById('scr');
const scenes = document.querySelectorAll('.scene');
const ndots  = document.querySelectorAll('.ndot');
const prog   = document.getElementById('prog');
const hdr    = document.getElementById('hdr');

/* IntersectionObserver per scene */
const io = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(!e.isIntersecting) return;
    const i = [...scenes].indexOf(e.target);

    // dots
    ndots.forEach(d=>d.classList.remove('on'));
    if(ndots[i]) ndots[i].classList.add('on');

    // 3D switch
    if(typeof _setScene==='function') _setScene(i);

    // text reveal
    e.target.querySelectorAll('.tag,.headline,.subline,.cards,.list,.hint').forEach(el=>{
      setTimeout(()=>el.classList.add('in'), 60);
    });
  });
},{threshold:.55, root:scr});

scenes.forEach(s=>io.observe(s));

// Progress
scr.addEventListener('scroll',()=>{
  const p = scr.scrollTop/(scr.scrollHeight-scr.clientHeight);
  prog.style.width=(p*100)+'%';
  hdr.classList.toggle('bg', scr.scrollTop>30);
},{passive:true});

// Dot nav
ndots.forEach(d=>{
  d.addEventListener('click',()=>scenes[+d.dataset.i].scrollIntoView({behavior:'smooth'}));
});

// First scene
window.addEventListener('load',()=>{
  setTimeout(()=>{
    scenes[0].querySelectorAll('.tag,.headline,.subline,.hint').forEach(el=>el.classList.add('in'));
  },400);
});
</script>
</body>
